<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Mehmet Mustafa Doğan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        .contact-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card-header { background: #212529; color: white; border-radius: 20px 20px 0 0 !important; padding: 25px; }
        .form-label { font-weight: 600; font-size: 0.85rem; color: #495057; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 1px solid #dee2e6; }
        .btn-custom { border-radius: 10px; padding: 10px 20px; font-weight: 600; transition: all 0.3s; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">MMD</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgialanlari.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link text-warning fw-bold" href="login.html">Giriş Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5" id="app">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card contact-card">
                    <div class="card-header text-center">
                        <h2 class="mb-0">İletişim Formu</h2>
                        <p class="small opacity-75 mb-0 mt-2">Aşağıdaki alanları eksiksiz doldurunuz.</p>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form id="contactForm">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">AD SOYAD</label>
                                    <input type="text" class="form-control" id="name" v-model="formData.name" placeholder="Örn: Mehmet Mustafa">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">E-POSTA</label>
                                    <input type="email" class="form-control" id="email" v-model="formData.email" placeholder="ornek@mail.com">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">TELEFON</label>
                                <input type="text" class="form-control" id="phone" v-model="formData.phone" placeholder="5XXXXXXXXX">
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">İLETİŞİM TERCİHİ</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="pref" value="E-posta" v-model="formData.pref">
                                    <label class="form-check-label">E-posta</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="pref" value="Telefon" v-model="formData.pref">
                                    <label class="form-check-label">Telefon</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">KONU</label>
                                <select class="form-select" id="subject" v-model="formData.subject">
                                    <option value="">Seçim yapınız...</option>
                                    <option value="Öneri">Öneri</option>
                                    <option value="Şikayet">Şikayet</option>
                                    <option value="İş Birliği">İş Birliği</option>
                                </select>
                            </div>

                            <div class="mb-4 form-check">
                                <input type="checkbox" class="form-check-input" id="kvkk" v-model="formData.kvkk">
                                <label class="form-check-label small text-muted">KVKK Aydınlatma Metni'ni onaylıyorum.</label>
                            </div>

                            <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                                <button type="button" class="btn btn-outline-dark btn-custom" onclick="validateJS()">Saf JS Denetimi</button>
                                <button type="button" class="btn btn-dark btn-custom" @click="validateVue">Vue.js Denetimi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. SAF JS DENETİMİ
        function validateJS() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const kvkk = document.getElementById('kvkk').checked;

            if(name === "" || email === "") {
                alert("Lütfen tüm alanları doldurun! (Saf JS Kontrolü)");
            } else if (!kvkk) {
                alert("KVKK onaylanmalıdır!");
            } else {
                alert("Form başarıyla doğrulandı! (JS)");
            }
        }

        // 2. VUE.JS DENETİMİ
        const { createApp } = Vue;
        createApp({
            data() {
                return {
                    formData: { name: '', email: '', phone: '', pref: '', subject: '', kvkk: false }
                }
            },
            methods: {
                validateVue() {
                    if (!this.formData.name || !this.formData.email) {
                        alert("Eksik bilgi var! (Vue.js Kontrolü)");
                    } else if (!this.formData.kvkk) {
                        alert("Lütfen KVKK kutusunu işaretleyin! (Vue.js)");
                    } else {
                        alert("Harika! Vue.js ile form başarıyla kontrol edildi.");
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
