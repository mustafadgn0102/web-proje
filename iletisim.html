<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İletişim | Mehmet Mustafa Doğan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">MMD</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hakkında</a></li>
                    <li class="nav-item"><a class="nav-link" href="cv.html">Özgeçmiş</a></li>
                    <li class="nav-item"><a class="nav-link" href="sehrim.html">Şehrim</a></li>
                    <li class="nav-item"><a class="nav-link" href="miras.html">Mirasımız</a></li>
                    <li class="nav-item"><a class="nav-link" href="ilgialanlari.html">İlgi Alanlarım</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                    <li class="nav-item"><a class="nav-link text-warning fw-bold" href="login.html">Giriş Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container mt-5 mb-5" id="app">
        
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold text-dark">İletişime Geç</h1>
            <p class="lead text-muted">Aşağıdaki formu kullanarak bana ulaşabilirsiniz.</p>
        </header>

        <section class="row justify-content-center">
            <div class="col-md-8">
                <div class="bg-white p-5 rounded shadow-sm">
                    
                    <form id="iletisimFormu">
                        
                        <div class="mb-3">
                            <label for="isim" class="form-label fw-bold">Adınız Soyadınız <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="isim" v-model="form.isim" placeholder="Örn: Ali Yılmaz">
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">E-posta Adresiniz <span class="text-danger">*</span></label>
                            <input type="email" class="form-control" id="email" v-model="form.email" placeholder="ornek@mail.com">
                        </div>

                        <div class="mb-3">
                            <label for="telefon" class="form-label fw-bold">Telefon Numaranız <span class="text-danger">*</span></label>
                            <input type="tel" class="form-control" id="telefon" v-model="form.telefon" placeholder="Sadece rakam giriniz (Örn: 5551234567)">
                        </div>

                        <div class="mb-3">
                            <label for="konu" class="form-label fw-bold">Konu <span class="text-danger">*</span></label>
                            <select class="form-select" id="konu" v-model="form.konu">
                                <option value="">Lütfen Bir Konu Seçiniz</option>
                                <option value="Genel Bilgi">Genel Bilgi</option>
                                <option value="Proje Teklifi">Proje Teklifi</option>
                                <option value="Hata Bildirimi">Hata Bildirimi</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="mesaj" class="form-label fw-bold">Mesajınız <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="mesaj" rows="4" v-model="form.mesaj" placeholder="Mesajınızı detaylıca yazınız..."></textarea>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="onay" v-model="form.onay">
                            <label class="form-check-label text-muted" for="onay">KVKK Aydınlatma Metni'ni okudum ve kabul ediyorum. <span class="text-danger">*</span></label>
                        </div>

                        <div id="sonucMesaji" class="alert d-none" role="alert"></div>

                        <hr>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button type="button" class="btn btn-secondary px-4 fw-bold" onclick="validateVanillaJS()">
                                Normal JS ile Kontrol Et
                            </button>
                            
                            <button type="button" class="btn btn-primary px-4 fw-bold" @click="validateVueJS">
                                Vue.js ile Kontrol Et
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function validateVanillaJS() {
            // DOM üzerinden elemanları yakalama
            const isim = document.getElementById('isim').value;
            const email = document.getElementById('email').value;
            const telefon = document.getElementById('telefon').value;
            const konu = document.getElementById('konu').value;
            const mesaj = document.getElementById('mesaj').value;
            const onay = document.getElementById('onay').checked;
            const sonucDiv = document.getElementById('sonucMesaji');

            // Hata mesajlarını tutacağımız dizi
            let hatalar = [];

            // Kontroller (Boş mu?)
            if(isim.trim() === "") hatalar.push("İsim alanı boş bırakılamaz.");
            if(mesaj.trim() === "") hatalar.push("Mesaj alanı boş bırakılamaz.");
            if(konu === "") hatalar.push("Lütfen bir konu seçiniz.");
            if(!onay) hatalar.push("KVKK metnini onaylamanız gerekmektedir.");

            // Email Format Kontrolü (Regex)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailRegex.test(email)) hatalar.push("Lütfen geçerli bir e-posta adresi giriniz.");

            // Telefon Rakam Kontrolü (Sadece rakam)
            const telefonRegex = /^[0-9]+$/;
            if(!telefonRegex.test(telefon)) hatalar.push("Telefon numarası sadece rakamlardan oluşmalıdır.");

            // Sonuçları Ekrana Yazdırma
            sonucDiv.classList.remove('d-none', 'alert-success', 'alert-danger');
            if(hatalar.length > 0) {
                sonucDiv.classList.add('alert-danger');
                sonucDiv.innerHTML = "<strong>Normal JS Hatası:</strong><br> - " + hatalar.join("<br> - ");
            } else {
                sonucDiv.classList.add('alert-success');
                sonucDiv.innerHTML = "<strong>Başarılı!</strong> Normal JS doğrulaması temiz, form gönderime hazır.";
            }
        }
    </script>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    // Vue model verileri
                    form: {
                        isim: '',
                        email: '',
                        telefon: '',
                        konu: '',
                        mesaj: '',
                        onay: false
                    }
                }
            },
            methods: {
                validateVueJS() {
                    let hatalar = [];
                    const sonucDiv = document.getElementById('sonucMesaji');

                    // Vue datası üzerinden kontroller
                    if(this.form.isim.trim() === "") hatalar.push("İsim alanı boş bırakılamaz.");
                    if(this.form.mesaj.trim() === "") hatalar.push("Mesaj alanı boş bırakılamaz.");
                    if(this.form.konu === "") hatalar.push("Lütfen bir konu seçiniz.");
                    if(!this.form.onay) hatalar.push("KVKK metnini onaylamanız gerekmektedir.");

                    // Email Format Kontrolü
                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if(!emailRegex.test(this.form.email)) hatalar.push("Lütfen geçerli bir e-posta adresi giriniz.");

                    // Telefon Rakam Kontrolü
                    const telefonRegex = /^[0-9]+$/;
                    if(!telefonRegex.test(this.form.telefon)) hatalar.push("Telefon numarası sadece rakamlardan oluşmalıdır.");

                    // Sonuçları Ekrana Yazdırma
                    sonucDiv.classList.remove('d-none', 'alert-success', 'alert-danger');
                    if(hatalar.length > 0) {
                        sonucDiv.classList.add('alert-danger');
                        sonucDiv.innerHTML = "<strong>Vue.js Hatası:</strong><br> - " + hatalar.join("<br> - ");
                    } else {
                        sonucDiv.classList.add('alert-success');
                        sonucDiv.innerHTML = "<strong>Başarılı!</strong> Vue.js doğrulaması temiz, veriler reaktif olarak alındı.";
                    }
                }
            }
        }).mount('#app')
    </script>

</body>
</html>
