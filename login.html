<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | Mehmet Mustafa Doğan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { border: none; border-radius: 20px; overflow: hidden; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .login-header { background: #212529; color: white; padding: 35px; text-align: center; }
        .btn-login { background-color: #212529; color: white; font-weight: 600; padding: 12px; border-radius: 10px; transition: all 0.3s ease; border: none; }
        .btn-login:hover { background-color: #343a40; color: #ffc107; transform: translateY(-2px); }
        .form-control { border-radius: 10px; padding: 12px; background-color: #f1f3f5; border: 1px solid #e9ecef; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">MMD</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active text-warning fw-bold" href="login.html">Giriş Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="login-wrapper">
        <div class="card">
            <div class="login-header">
                <h2 class="fw-bold mb-1">Öğrenci Girişi</h2>
                <p class="small text-secondary mb-0">Sakarya Üniversitesi | Bilgi Sistemi</p>
            </div>
            <div class="card-body p-4 p-md-5">
                <form id="loginForm" action="login.php" method="POST">
                    <div class="mb-4">
                        <label for="email" class="form-label fw-bold small text-dark">E-POSTA ADRESİ</label>
                        <input type="email" class="form-control" name="email" id="email" placeholder="b2412100001@sakarya.edu.tr">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold small text-dark">ŞİFRE</label>
                        <input type="password" class="form-control" name="password" id="password" placeholder="Öğrenci Numaranız">
                    </div>
                    <button type="submit" class="btn btn-login w-100 shadow-sm">Giriş Yap</button>
                    
                    <div id="loginStatus" class="alert d-none mt-3 fw-bold small text-center" role="alert"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const statusBox = document.getElementById('loginStatus');

            // 1. ADIM: Boş alan kontrolü
            if (email === "" || password === "") {
                event.preventDefault();
                statusBox.textContent = "Hata: Alanlar boş bırakılamaz!";
                statusBox.className = "alert alert-danger d-block";
                return;
            }

            // 2. ADIM: Mail formatı kontrolü (Ödev dökümanına göre)
            if (!email.toLowerCase().endsWith("@sakarya.edu.tr")) {
                event.preventDefault();
                statusBox.textContent = "Hata: @sakarya.edu.tr uzantılı mail girmelisiniz!";
                statusBox.className = "alert alert-danger d-block";
                return;
            }
        });
    </script>
</body>
</html>
